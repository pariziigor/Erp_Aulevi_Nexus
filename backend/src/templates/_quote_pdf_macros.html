{% macro logo(size) -%}
<svg class="brand-logo" width="{{ size }}" height="{{ size }}" viewBox="0 0 96 96"
     xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="96" height="96" rx="20" fill="#1e1e1e"/>
    <polygon points="48,70 24,28 72,28" fill="none" stroke="#E87820"
             stroke-width="5" stroke-linejoin="round"/>
    <line x1="32" y1="56" x2="64" y2="56" stroke="#E87820"
          stroke-width="4.5" stroke-linecap="round"/>
</svg>
{%- endmacro %}

{% macro section_heading(number, title) -%}
<div class="section-heading">
    <div class="section-num">{{ number }}</div>
    <div class="section-title">{{ title }}</div>
    <div class="section-line"></div>
</div>
{%- endmacro %}
